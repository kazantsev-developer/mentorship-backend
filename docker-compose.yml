version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: mentorship_postgres
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mentorship
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mentorship_backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mentor
      DB_PASSWORD: secret
      DB_NAME: mentorship
      DB_SSLMODE: disable
      JWT_SECRET: your-super-secret-key
      GIN_MODE: release
    restart: unless-stopped

volumes:
  pg_data:
