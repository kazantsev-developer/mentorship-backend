services:
  postgres:
    image: postgres:15
    container_name: mentorship_postgres
    environment:
      POSTGRES_USER: mentor
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mentorship
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: .
    container_name: mentorship_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: mentor
      DB_PASSWORD: secret
      DB_NAME: mentorship
      DB_SSLMODE: disable
      JWT_SECRET: your-super-secret-key
      GIN_MODE: release
      PORT: 8080
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001,http://185.75.189.130:3000,http://185.75.189.130:3001"
    restart: unless-stopped

volumes:
  pg_data:
